{% extends "base.html" %}
{% load static %}

{% block title %}Mon profil{% endblock %}

{% block content %}
<h1>Mon profil</h1>

<!-- Formulaire profil -->
<form method="post" action="">
    {% csrf_token %}
    <fieldset>
        <legend>Informations personnelles</legend>
        {{ form.as_p }}
    </fieldset>
    <button type="submit" name="save_profile">Enregistrer le profil</button>
</form>

<hr>

<!-- Formulaire mot de passe -->
<form method="post" action="">
    {% csrf_token %}
    <fieldset>
        <legend>Changer le mot de passe</legend>
        {{ password_form.as_p }}
    </fieldset>
    <button type="submit" name="change_password">Changer le mot de passe</button>
</form>
{% endblock %}
